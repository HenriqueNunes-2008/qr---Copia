<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Central de QR Codes</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/qrcode/build/qrcode.min.js"></script>
    <style>
        body { font-family: 'Montserrat', sans-serif; background-color: #145392; color: #FFFFFF; margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; background: #FFFFFF; padding: 30px; border-radius: 15px; color: #1A345B; }
        h1, h2 { color: #145392; text-align: center; }
        .section { margin-bottom: 50px; padding-top: 20px; border-top: 2px solid #eef2f7; }
        .section:first-of-type { border-top: none; }
        
        /* Grid de Cards */
        .qrcode-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; text-align: center; transition: transform 0.2s; }
        .card:hover { transform: translateY(-5px); }
        .card canvas { width: 100% !important; height: auto !important; margin: 10px 0; border-radius: 8px; }
        .card .id-label { font-size: 0.8rem; color: #64748b; font-weight: bold; }
        .card .name-label { font-size: 1rem; font-weight: 700; color: #1e293b; margin: 5px 0; min-height: 40px; display: flex; align-items: center; justify-content: center; }
        
        /* Botões */
        .btn-group { display: flex; gap: 5px; justify-content: center; margin-top: 10px; }
        .btn { padding: 8px 12px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-weight: bold; text-decoration: none; display: inline-block; }
        .btn-download { background: #3C1276; color: white; }
        .btn-print { background: #4CBDE0; color: #1A345B; }
        
        /* Formulário Cadastro */
        .form-box { background: #f1f5f9; padding: 20px; border-radius: 12px; max-width: 500px; margin: 0 auto 30px auto; }
        .form-box input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 8px; border: 1px solid #cbd5e1; box-sizing: border-box; }
        .form-box button { width: 100%; padding: 12px; background: #3C1276; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        
        .nav-back { margin-bottom: 20px; }
        .nav-back a { color: white; text-decoration: none; font-weight: bold; }

        @media print {
            .no-print { display: none; }
            body { background: white; padding: 0; }
            .container { box-shadow: none; width: 100%; max-width: 100%; }
            .card { break-inside: avoid; border: 1px solid #eee; }
        }
    </style>
</head>
<body>
    <div class="nav-back no-print">
        <a href="/admin">← Voltar ao Painel Administrativo</a>
    </div>

    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1 style="margin: 0;">Central de QR Codes</h1>
            <button class="btn btn-print no-print" onclick="window.print()" style="padding: 12px 24px; font-size: 1rem;">Imprimir Todos os QR Codes</button>
        </div>

        <!-- 2. QR Codes de Atividades -->
        <div class="section">
            <h2>2. QR Codes de Atividades</h2>
            <div id="grid-atividades" class="qrcode-grid"></div>
        </div>

        <!-- 3. QR Codes de Funcionários -->
        <div class="section">
            <h2>3. QR Codes de Funcionários</h2>
            <div id="grid-funcionarios" class="qrcode-grid"></div>
        </div>

        <!-- 4. QR Codes de Áreas -->
        <div class="section">
            <h2>4. QR Codes de Áreas</h2>
            <div id="grid-areas" class="qrcode-grid"></div>
        </div>

        <!-- 5. QR Codes de Projetos -->
        <div class="section">
            <h2>5. QR Codes de Projetos</h2>
            <div id="grid-projetos" class="qrcode-grid"></div>
        </div>
    </div>

    <script>
        // Configuração AJAX para carregar tudo
        async function carregarCentral() {
            try {
                const resp = await fetch('/admin/get_qrcodes');
                const data = await resp.json();

                renderizarSecao('atividades', data.atividades, 'ATIVIDADE');
                renderizarSecao('funcionarios', data.funcionarios, 'FUNCIONARIO');
                renderizarSecao('areas', data.areas, 'AREA');
                renderizarSecao('projetos', data.projetos, 'PROJETO');
            } catch (e) {
                console.error("Erro ao carregar dados:", e);
            }
        }

        function renderizarSecao(containerId, lista, prefixo) {
            const container = document.getElementById(`grid-${containerId}`);
            container.innerHTML = '';
            
            lista.forEach(item => {
                const card = criarCard(item, prefixo);
                container.appendChild(card);
            });
        }

        function criarCard(item, prefixo) {
            const card = document.createElement('div');
            card.className = 'card';
            
            const content = `${prefixo}:${item.id}`;
            
            card.innerHTML = `
                <div class="id-label">ID: ${item.id}</div>
                <div class="name-label">${item.nome}</div>
                <canvas id="qr-${prefixo}-${item.id}"></canvas>
                <div class="btn-group no-print">
                    <button class="btn btn-download" onclick="downloadQR('${prefixo}-${item.id}', '${item.nome}')">Download</button>
                </div>
            `;

            // Gerar QR Code no Canvas
            setTimeout(() => {
                const canvas = document.getElementById(`qr-${prefixo}-${item.id}`);
                QRCode.toCanvas(canvas, content, {
                    width: 200,
                    margin: 2,
                    color: { dark: "#000000", light: "#ffffff" }
                });
            }, 50);

            return card;
        }

        function downloadQR(id, nome) {
            const canvas = document.getElementById(`qr-${id}`);
            const link = document.createElement('a');
            link.download = `QR_${id}_${nome}.png`;
            link.href = canvas.toDataURL("image/png");
            link.click();
        }

        window.onload = carregarCentral;
    </script>
</body>
</html>
