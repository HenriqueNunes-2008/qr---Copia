<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8" />
    <title>Registro QR Code</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/html5-qrcode@2.3.8"></script>
    <script src="/static/config.js"></script>
    <script src="/static/script.js" defer></script>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            background: #145392;
            font-family: 'Montserrat', sans-serif;
            margin: 0;
            min-height: 100vh;
            color: #FFFFFF;
        }
        
        .topbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 120px; /* Altura da topbar conforme exemplo */
            background: #FFFFFF;
            z-index: 40;
            box-shadow: 0 2px 8px rgba(0,0,0,.08);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            border-radius: 0 0 50px 50px;
        }

        .topbar-buttons {
            display: flex;
            gap: 10px;
        }

        .logo-topbar {
            max-height: 80px; /* Ajuste o tamanho do logo na topbar */
            transform: scale(2.1);
            margin-left: 0;
            margin-right: 0;
        }

        /* Evita corte/overflow do logo em telas pequenas */
        .topbar img.logo-topbar {
            display: block;
            object-fit: contain;
        }


        .main-container {
            width: 100%;
            min-height: calc(100vh - 120px); /* Ajusta a altura para considerar a topbar de 120px */
            margin-top: 120px; /* Espaço para a topbar fixa */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 3rem 1rem;
        }

        h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 2rem;
            color: #FFFFFF;
            text-align: center;
        }

        #reader {
            width: 320px;
            max-width: 90vw;
            border-radius: 15px;
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.3);
            background-color: #FFFFFF;
            padding: 12px 12px 12px 12px;
            margin-bottom: 2rem;
            border: 4px solid #4CBDE0;
            overflow: hidden;
        }

        #formContainer {
            background: #FFFFFF;
            border-radius: 15px;
            padding: 25px;
            width: 320px;
            max-width: 90vw;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
            display: none;
            color: #145392;
            backdrop-filter: blur(12px);
            border: 2px solid #3C1276;
        }

        #formContainer p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            font-weight: 700;
            text-align: center;
        }

        form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        label {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 6px;
            color: #145392;
        }

        select, input[type="text"], input[type="email"], input[type="password"] {
            width: 100%;
            padding: 12px 16px;
            font-size: 1rem;
            border-radius: 8px;
            border: 1.8px solid #657788;
            outline: none;
            background-color: #FFFFFF;
            color: #000000;
            font-family: 'Montserrat', sans-serif;
            transition: border-color 0.3s ease;
        }

        select:focus, input[type="text"]:focus, input[type="email"]:focus, input[type="password"]:focus {
            border-color: #4CBDE0;
        }

        button {
            padding: 14px 22px;
            background-color: #3C1276;
            color: #FFFFFF;
            font-size: 1.2rem;
            font-weight: 700;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        button:hover:not(:disabled) {
            background-color: #4CBDE0;
            color: #000000;
        }

        button:disabled {
            background-color: #657788;
            cursor: not-allowed;
        }

        @media (max-width: 480px) {
            .topbar {
                height: 80px;
                padding: 0 15px;
                border-radius: 0 0 30px 30px;
            }
            .logo-topbar {
                max-height: 40px;
            }
            .main-container {
                margin-top: 80px;
                padding: 1.5rem 0.8rem;
            }

            h1 {
                font-size: 1.8rem;
            }

            #reader, #formContainer {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="topbar">
        <img src="/static/LogoFlexcolor2.png" alt="Logo Fleximedical" class="logo-topbar">
        <div class="topbar-buttons">
            <button id="registerBtn" style="background-color: #4CBDE0; color: #000000;">Cadastre-se</button>
            <button id="adminBtn" style="background-color: #3C1276; color: #FFFFFF;">Login</button>
        </div>
    </div>

    <div class="main-container">
        <h1>Registro via QR Code</h1>

        <div id="reader"></div>
        <div id="formContainer"></div>

        <!-- Modal de Login -->
        <div id="loginModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
            <div style="background: #FFFFFF; padding: 30px; border-radius: 15px; border: 2px solid #3C1276; width: 350px;">
                <h2 style="color: #145392; margin-bottom: 20px; font-weight: 700;">Login</h2>
                <form id="loginForm">
                    <label for="username">Usuário:</label>
                    <input type="text" id="username" required style="margin-bottom: 15px; display: block;">
                    <label for="password">Senha:</label>
                    <input type="password" id="password" required style="margin-bottom: 15px; display: block;">
                    <button type="submit" style="width: 100%;">Entrar</button>
                    <button type="button" id="cancelBtn" style="width: 100%; margin-top: 10px; background: #657788;">Cancelar</button>
                </form>
            </div>
        </div>

        <!-- Modal de Cadastro -->
        <div id="registerModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); justify-content: center; align-items: center; z-index: 1000;">
            <div style="background: #FFFFFF; padding: 30px; border-radius: 15px; border: 2px solid #4CBDE0; width: 350px;">
                <h2 style="color: #145392; margin-bottom: 20px; font-weight: 700;">Solicitar Acesso</h2>
                <form id="publicRegisterForm">
                    <label>Usuário:</label>
                    <input type="text" id="regUser" required style="margin-bottom: 15px; display: block;">
                    <label>E-mail:</label>
                    <input type="email" id="regEmail" required style="margin-bottom: 15px; display: block;">
                    <label>Senha:</label>
                    <input type="password" id="regPass" required style="margin-bottom: 20px; display: block;">
                    <button type="submit" style="width: 100%; background-color: #4CBDE0; color: #000000;">Enviar Solicitação</button>
                    <button type="button" onclick="document.getElementById('registerModal').style.display='none'" style="width: 100%; margin-top: 10px; background: #657788;">Cancelar</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
